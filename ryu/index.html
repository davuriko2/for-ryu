<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For You ❤️</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(-45deg, #fde2e4, #fad2e1, #e2ece9, #cddafd);
        background-size: 400% 400%;
        animation: gradientShift 12s ease infinite;
        font-family: "Times New Roman", serif;
        margin: 0;
        overflow: hidden;
        transition: background 0.5s ease;
      }

      @keyframes gradientShift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      h1 {
        color: #bd3131;
        font-size: 3rem;
        margin-bottom: 20px;
        text-align: center;
        z-index: 10;
        text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.6);
        animation: titlePulse 2s ease-in-out infinite;
      }

      @keyframes titlePulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.06);
        }
      }

      /* Tambahan wadah gambar agar layout tidak melompat atau hilang */
      .image-container {
        min-height: 250px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 30px;
        z-index: 10;
      }

      img {
        width: 250px;
        height: 250px;
        object-fit: contain;
        animation: floaty 3s ease-in-out infinite;
        filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.15));
      }

      @keyframes floaty {
        0%,
        100% {
          transform: translateY(0) rotate(-1deg);
        }
        50% {
          transform: translateY(-14px) rotate(1deg);
        }
      }

      .image-container.shake img {
        animation: shake 0.4s ease;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-12px) rotate(-4deg);
        }
        40% {
          transform: translateX(12px) rotate(4deg);
        }
        60% {
          transform: translateX(-8px) rotate(-2deg);
        }
        80% {
          transform: translateX(8px) rotate(2deg);
        }
      }

      .buttons {
        display: flex;
        gap: 15px;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }

      button {
        border: none;
        border-radius: 50px;
        color: white;
        cursor: pointer;
        font-size: 1.5rem;
        padding: 10px 25px;
        font-family: "Times New Roman", serif;
        transition:
          transform 0.15s ease,
          background-color 0.3s ease,
          box-shadow 0.3s ease,
          font-size 0.3s ease,
          padding 0.3s ease;
        box-shadow: 0 6px 0 rgba(0, 0, 0, 0.15);
      }

      button:active {
        transform: translateY(4px);
        box-shadow: 0 2px 0 rgba(0, 0, 0, 0.15);
      }

      #yes-btn {
        background-color: #2e8b57;
        animation: yesGlow 1.5s ease-in-out infinite;
      }

      #yes-btn:hover {
        transform: scale(1.08);
      }

      @keyframes yesGlow {
        0%,
        100% {
          box-shadow:
            0 6px 0 rgba(0, 0, 0, 0.15),
            0 0 0 rgba(46, 139, 87, 0);
        }
        50% {
          box-shadow:
            0 6px 0 rgba(0, 0, 0, 0.15),
            0 0 25px rgba(46, 139, 87, 0.7);
        }
      }

      #no-btn {
        background-color: #d9534f;
      }

      /* Hati melayang */
      .heart {
        position: fixed;
        bottom: -40px;
        font-size: 1.5rem;
        pointer-events: none;
        z-index: 5;
        animation: rise linear forwards;
      }

      @keyframes rise {
        0% {
          transform: translateY(0) scale(0.6);
          opacity: 1;
        }
        100% {
          transform: translateY(-110vh) scale(1.2);
          opacity: 0;
        }
      }

      /* Konfeti saat YES */
      .confetti {
        position: fixed;
        top: -20px;
        width: 10px;
        height: 16px;
        pointer-events: none;
        z-index: 20;
        animation: fall linear forwards;
      }

      @keyframes fall {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0.8;
        }
      }

      /* Kartu tanggal & waktu saat menerima cinta */
      #love-stamp {
        margin-top: 10px;
        z-index: 10;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(6px);
        border: 2px dashed #ff8fab;
        border-radius: 20px;
        padding: 18px 28px;
        text-align: center;
        color: #bd3131;
        box-shadow: 0 10px 25px rgba(189, 49, 49, 0.15);
        opacity: 0;
        transform: scale(0.5) rotate(-6deg);
        transition:
          opacity 0.5s ease,
          transform 0.5s cubic-bezier(0.18, 1.4, 0.4, 1);
        max-width: 90vw;
      }

      #love-stamp.show {
        opacity: 1;
        transform: scale(1) rotate(-2deg);
        animation: stampWobble 3s ease-in-out infinite 0.6s;
      }

      @keyframes stampWobble {
        0%,
        100% {
          transform: scale(1) rotate(-2deg);
        }
        50% {
          transform: scale(1.03) rotate(2deg);
        }
      }

      #love-stamp .stamp-label {
        font-size: 1rem;
        letter-spacing: 1px;
        opacity: 0.8;
        margin-bottom: 6px;
      }

      #love-stamp .stamp-date {
        font-size: 1.6rem;
        font-weight: bold;
      }

      #love-stamp .stamp-time {
        font-size: 1.3rem;
        margin-top: 4px;
      }

      /* Tombol unduh bukti */
      #download-btn {
        margin-top: 18px;
        z-index: 10;
        background: linear-gradient(135deg, #ff8fab, #ff5d8f);
        font-size: 1.2rem;
        padding: 12px 28px;
        opacity: 0;
        transform: translateY(15px);
        transition:
          opacity 0.5s ease 0.4s,
          transform 0.5s ease 0.4s,
          filter 0.2s ease;
        display: none;
      }

      #download-btn.show {
        display: inline-block;
        opacity: 1;
        transform: translateY(0);
      }

      #download-btn:hover {
        filter: brightness(1.1);
        transform: scale(1.06);
      }

      /* Tombol throwback kenangan */
      #throwback-btn {
        margin-top: 12px;
        z-index: 10;
        background: linear-gradient(135deg, #c77dff, #7b2ff7);
        font-size: 1.2rem;
        padding: 12px 28px;
        opacity: 0;
        transform: translateY(15px);
        transition:
          opacity 0.5s ease 0.6s,
          transform 0.5s ease 0.6s,
          filter 0.2s ease;
        display: none;
      }

      #throwback-btn.show {
        display: inline-block;
        opacity: 1;
        transform: translateY(0);
      }

      #throwback-btn:hover {
        filter: brightness(1.12);
        transform: scale(1.06);
      }

      /* Modal galeri kenangan */
      #gallery-modal {
        position: fixed;
        inset: 0;
        background: rgba(60, 20, 50, 0.55);
        backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 100;
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      #gallery-modal.open {
        display: flex;
        opacity: 1;
      }

      .gallery-box {
        background: linear-gradient(160deg, #fff, #ffe9f3);
        border-radius: 28px;
        padding: 24px;
        width: min(90vw, 460px);
        text-align: center;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
        transform: scale(0.7) rotate(-3deg);
        transition: transform 0.45s cubic-bezier(0.18, 1.4, 0.4, 1);
      }

      #gallery-modal.open .gallery-box {
        transform: scale(1) rotate(0deg);
      }

      .gallery-title {
        color: #bd3131;
        font-size: 1.7rem;
        margin: 0 0 4px;
      }

      .gallery-sub {
        color: #b06;
        font-size: 0.95rem;
        margin-bottom: 16px;
        opacity: 0.8;
      }

      .polaroid {
        background: #fff;
        padding: 14px 14px 0;
        border-radius: 10px;
        box-shadow: 0 12px 25px rgba(0, 0, 0, 0.18);
        display: inline-block;
        transform: rotate(-2deg);
        transition:
          transform 0.4s ease,
          opacity 0.4s ease;
        max-width: 100%;
      }

      .polaroid.swap {
        opacity: 0;
        transform: rotate(-2deg) scale(0.92);
      }

      .polaroid img {
        width: 320px;
        max-width: 72vw;
        height: 320px;
        object-fit: cover;
        border-radius: 6px;
        animation: none;
        filter: none;
        display: block;
      }

      .polaroid .caption {
        font-family: "Times New Roman", serif;
        color: #5a3a3a;
        font-size: 1.1rem;
        padding: 12px 6px 16px;
      }

      .gallery-nav {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 18px;
        margin-top: 16px;
      }

      .gallery-nav button {
        font-size: 1.3rem;
        padding: 8px 18px;
        border-radius: 50px;
        background: linear-gradient(135deg, #ff8fab, #ff5d8f);
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.15);
      }

      .gallery-dots {
        margin-top: 14px;
        display: flex;
        justify-content: center;
        gap: 8px;
      }

      .gallery-dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #f3b6cd;
        transition: all 0.3s ease;
      }

      .gallery-dots span.active {
        background: #ff5d8f;
        transform: scale(1.4);
      }

      #close-gallery {
        margin-top: 18px;
        background: #d9534f;
        font-size: 1rem;
        padding: 8px 22px;
        border-radius: 50px;
      }
    </style>
  </head>
  <body>
    <h1 id="question">Apakah Kamu Mau Menjadi Pasangan Aku ?????????</h1>

    <div class="image-container">
      <img
        id="character"
        src="https://media.tenor.com/GjqDGXrYAEEAAAAm/heart-love.webp"
        alt="Karakter Lucu"
      />
    </div>

    <div class="buttons">
      <button id="yes-btn">YES</button>
      <button id="no-btn">NO</button>
    </div>

    <!-- Modal galeri kenangan -->
    <div id="gallery-modal">
      <div class="gallery-box">
        <h2 class="gallery-title">📸 Throwback Kenangan Kita 💕</h2>
        <div class="gallery-sub">Geser untuk lihat momen manis kita ✨</div>
        <div class="polaroid" id="polaroid">
          <img id="gallery-img" src="" alt="Kenangan kita" />
          <div class="caption" id="gallery-caption"></div>
        </div>
        <div class="gallery-nav">
          <button id="prev-photo">⬅️</button>
          <button id="next-photo">➡️</button>
        </div>
        <div class="gallery-dots" id="gallery-dots"></div>
        <button id="close-gallery">Tutup ❌</button>
      </div>
    </div>

    <script>
      const yesBtn = document.getElementById("yes-btn");
      const noBtn = document.getElementById("no-btn");
      const character = document.getElementById("character");
      const questionText = document.getElementById("question");
      const buttonsContainer = document.querySelector(".buttons");

      // Kata-kata yang makin lama makin memelas (Bisa kamu edit sendiri)
      const noTexts = [
        "NO",
        "Are you sure?",
        "What if I cry?",
        "Pookie please...",
        "Don't do this to me :(",
        "I'm gonna cry...",
        "You're breaking my heart 💔",
        "Please just click yes...",
        "I'll be very sad...",
        "Pleaseee...",
      ];

      // Link gambar yang makin lama makin sedih (urutannya pas dengan kata-kata di atas)
      const sadGifs = [
        "https://media.tenor.com/GjqDGXrYAEEAAAAm/heart-love.webp", // Awal
        "https://media.tenor.com/XSkDXFEB8AIAAAAm/blinking-cat-blinking.webp", // Klik 1
        "https://media.tenor.com/AKqNbzy45x8AAAAm/begging.webp", // Klik 2
        "https://media.tenor.com/CwEtfzA2SmwAAAAm/okay-mochi.webp", // Klik 3
        "https://media.tenor.com/x8Egs-r72gYAAAAm/hm.webp", // Klik 4
        "https://media.tenor.com/X0AU4rFwjYsAAAAm/mochi-cat-mad-cat.webp", // Klik 5
        "https://media.tenor.com/21BS9Gb-UVQAAAAm/hm.webp", // Klik 6
        "https://media.tenor.com/wNXTPoqWvLgAAAAM/kais204.gif", // Klik 7
        "https://media.tenor.com/vE_i60ZY2XkAAAAM/spongebob-squarepants-begging.gif", // Klik 8
        "https://media.tenor.com/iEXbs40PJrYAAAA1/heart-broken-broken-heart.webp", // Klik 9
      ];

      const imageContainer = document.querySelector(".image-container");

      let noCount = 0;
      let yesFontSize = 1.5;
      let yesPadding = 10;

      // Membuat hati melayang dari bawah layar
      function spawnHeart() {
        const heart = document.createElement("div");
        heart.className = "heart";
        const emojis = ["❤️", "💖", "💕", "💗", "💓", "🩷"];
        heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = 1 + Math.random() * 1.8 + "rem";
        heart.style.animationDuration = 4 + Math.random() * 4 + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
      }
      setInterval(spawnHeart, 600);

      // Efek getar pada gambar
      function shakeCharacter() {
        imageContainer.classList.add("shake");
        setTimeout(() => imageContainer.classList.remove("shake"), 400);
      }

      // Tombol NO yang nakal: kabur saat di-hover
      function dodge() {
        if (noCount < 2) return; // mulai kabur setelah beberapa klik
        const maxX = window.innerWidth - noBtn.offsetWidth - 20;
        const maxY = window.innerHeight - noBtn.offsetHeight - 20;
        noBtn.style.position = "fixed";
        noBtn.style.left = Math.random() * maxX + "px";
        noBtn.style.top = Math.random() * maxY + "px";
      }
      noBtn.addEventListener("mouseover", dodge);

      noBtn.addEventListener("click", () => {
        noCount++;

        // Ganti kata-kata di tombol NO
        const textIndex = Math.min(noCount, noTexts.length - 1);
        noBtn.innerText = noTexts[textIndex];

        // Ganti gambar secara dinamis
        const gifIndex = Math.min(noCount, sadGifs.length - 1);
        character.src = sadGifs[gifIndex];

        // Efek getar lucu
        shakeCharacter();

        // Perbesar tombol YES
        yesFontSize += 1.8;
        yesPadding += 15;
        yesBtn.style.fontSize = `${yesFontSize}rem`;
        yesBtn.style.padding = `${yesPadding}px ${yesPadding * 2.5}px`;

        // Tombol NO mengecil seiring waktu
        noBtn.style.transform = `scale(${Math.max(0.5, 1 - noCount * 0.06)})`;
      });

      // Ledakan konfeti saat YES
      function burstConfetti() {
        const colors = [
          "#ff6b6b",
          "#ffd93d",
          "#6bcB77",
          "#4d96ff",
          "#ff8fab",
          "#c77dff",
        ];
        for (let i = 0; i < 120; i++) {
          const c = document.createElement("div");
          c.className = "confetti";
          c.style.left = Math.random() * 100 + "vw";
          c.style.backgroundColor =
            colors[Math.floor(Math.random() * colors.length)];
          c.style.animationDuration = 2 + Math.random() * 2 + "s";
          c.style.animationDelay = Math.random() * 0.5 + "s";
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 4500);
        }
      }

      // Menampilkan tanggal & waktu lucu saat dia menerima cinta
      function showLoveStamp() {
        const now = new Date();
        const hari = [
          "Minggu",
          "Senin",
          "Selasa",
          "Rabu",
          "Kamis",
          "Jumat",
          "Sabtu",
        ];
        const bulan = [
          "Januari",
          "Februari",
          "Maret",
          "April",
          "Mei",
          "Juni",
          "Juli",
          "Agustus",
          "September",
          "Oktober",
          "November",
          "Desember",
        ];

        const namaHari = hari[now.getDay()];
        const tanggal = now.getDate();
        const namaBulan = bulan[now.getMonth()];
        const tahun = now.getFullYear();
        const jam = String(now.getHours()).padStart(2, "0");
        const menit = String(now.getMinutes()).padStart(2, "0");
        const detik = String(now.getSeconds()).padStart(2, "0");

        const stamp = document.createElement("div");
        stamp.id = "love-stamp";
        stamp.innerHTML = `
          <div class="stamp-label">📜 Tersegel selamanya pada 💌</div>
          <div class="stamp-date">${namaHari}, ${tanggal} ${namaBulan} ${tahun}</div>
          <div class="stamp-time">pukul ${jam}:${menit}:${detik} WIB ⏰💞</div>
          <div class="stamp-label" style="margin-top:8px;">
            Detik di mana kamu resmi jadi pasangan aku 🥰💍
          </div>
        `;
        document.body.appendChild(stamp);

        // Munculkan dengan animasi
        requestAnimationFrame(() => stamp.classList.add("show"));

        // Simpan info tanggal untuk surat
        window.__loveDate = {
          namaHari,
          tanggal,
          namaBulan,
          tahun,
          jam,
          menit,
          detik,
        };

        // Tambahkan tombol unduh bukti
        const dlBtn = document.createElement("button");
        dlBtn.id = "download-btn";
        dlBtn.innerText = "📥 Unduh Bukti Cinta Kita 💌";
        document.body.appendChild(dlBtn);
        requestAnimationFrame(() => dlBtn.classList.add("show"));
        dlBtn.addEventListener("click", downloadLoveLetter);

        // Tambahkan tombol throwback kenangan
        const tbBtn = document.createElement("button");
        tbBtn.id = "throwback-btn";
        tbBtn.innerText = "📸 Lihat Foto Kenangan Kita 💞";
        document.body.appendChild(tbBtn);
        requestAnimationFrame(() => tbBtn.classList.add("show"));
        tbBtn.addEventListener("click", openGallery);
      }

      // ====== GALERI KENANGAN ======
      // Foto diambil dari folder "foto_kenangan". Caption bisa kamu edit
      // sesuka hati sesuai cerita kalian. 💕
      const memories = [
        {
          src: "foto_kenangan/IMG_20250905_124958.jpg",
          caption: "5 September 2025 🥰",
        },
        {
          src: "foto_kenangan/IMG_20251101_112908.jpg",
          caption: "1 November 2025 🌸",
        },
        {
          src: "foto_kenangan/IMG_20251219_151654.jpg",
          caption: "19 Desember 2025 💞",
        },
        {
          src: "foto_kenangan/IMG_20251224_190209.jpg",
          caption: "24 Desember 2025 🎄",
        },
        {
          src: "foto_kenangan/IMG_20260508_180551.jpg",
          caption: "8 Mei 2026 ✨",
        },
        {
          src: "foto_kenangan/IMG_20260528_212913.jpg",
          caption: "28 Mei 2026 💗",
        },
        {
          src: "foto_kenangan/IMG_20260604_143757.jpg",
          caption: "4 Juni 2026 😆",
        },
        {
          src: "foto_kenangan/webcam-toy-photo3.jpg",
          caption: "Momen lucu kita 📸",
        },
        {
          src: "foto_kenangan/webcam-toy-photo8.jpg",
          caption: "Dan masih banyak lagi... I love you! 💍💕",
        },
      ];

      let currentPhoto = 0;
      const galleryModal = document.getElementById("gallery-modal");
      const galleryImg = document.getElementById("gallery-img");
      const galleryCaption = document.getElementById("gallery-caption");
      const polaroid = document.getElementById("polaroid");
      const galleryDots = document.getElementById("gallery-dots");

      // Buat titik indikator
      memories.forEach((_, i) => {
        const dot = document.createElement("span");
        dot.addEventListener("click", () => showPhoto(i));
        galleryDots.appendChild(dot);
      });

      function showPhoto(index) {
        currentPhoto = (index + memories.length) % memories.length;
        // Efek transisi swap
        polaroid.classList.add("swap");
        setTimeout(() => {
          galleryImg.src = memories[currentPhoto].src;
          galleryCaption.innerText = memories[currentPhoto].caption;
          // Sedikit kemiringan acak biar terasa seperti polaroid asli
          polaroid.style.transform = `rotate(${(Math.random() * 6 - 3).toFixed(
            1,
          )}deg)`;
          polaroid.classList.remove("swap");
        }, 200);

        // Update titik aktif
        [...galleryDots.children].forEach((d, i) =>
          d.classList.toggle("active", i === currentPhoto),
        );
      }

      function openGallery() {
        showPhoto(0);
        galleryModal.classList.add("open");
      }

      document
        .getElementById("close-gallery")
        .addEventListener("click", () => galleryModal.classList.remove("open"));
      document
        .getElementById("next-photo")
        .addEventListener("click", () => showPhoto(currentPhoto + 1));
      document
        .getElementById("prev-photo")
        .addEventListener("click", () => showPhoto(currentPhoto - 1));
      // Tutup saat klik area luar
      galleryModal.addEventListener("click", (e) => {
        if (e.target === galleryModal) galleryModal.classList.remove("open");
      });

      // Membuat & mengunduh surat cinta sebagai gambar
      function downloadLoveLetter() {
        const d = window.__loveDate;
        const W = 1080;
        const H = 1350;
        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext("2d");

        // Latar gradien lembut
        const bg = ctx.createLinearGradient(0, 0, W, H);
        bg.addColorStop(0, "#fde2e4");
        bg.addColorStop(0.5, "#fad2e1");
        bg.addColorStop(1, "#fdd9ec");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Kartu surat putih dengan sudut membulat
        const pad = 70;
        const cardX = pad;
        const cardY = pad;
        const cardW = W - pad * 2;
        const cardH = H - pad * 2;
        const r = 40;
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.beginPath();
        ctx.moveTo(cardX + r, cardY);
        ctx.arcTo(cardX + cardW, cardY, cardX + cardW, cardY + cardH, r);
        ctx.arcTo(cardX + cardW, cardY + cardH, cardX, cardY + cardH, r);
        ctx.arcTo(cardX, cardY + cardH, cardX, cardY, r);
        ctx.arcTo(cardX, cardY, cardX + cardW, cardY, r);
        ctx.closePath();
        ctx.shadowColor = "rgba(189,49,49,0.18)";
        ctx.shadowBlur = 40;
        ctx.shadowOffsetY = 20;
        ctx.fill();
        ctx.shadowColor = "transparent";

        // Bingkai garis putus-putus
        ctx.strokeStyle = "#ff8fab";
        ctx.lineWidth = 4;
        ctx.setLineDash([16, 12]);
        ctx.strokeRect(cardX + 30, cardY + 30, cardW - 60, cardH - 60);
        ctx.setLineDash([]);

        const centerX = W / 2;
        ctx.textAlign = "center";

        // Judul
        ctx.fillStyle = "#bd3131";
        ctx.font = "bold 64px 'Times New Roman', serif";
        ctx.fillText("💌 Surat Cinta 💌", centerX, cardY + 150);

        ctx.font = "italic 34px 'Times New Roman', serif";
        ctx.fillStyle = "#d6608a";
        ctx.fillText("Untuk Rahayu Belahan Hati aku 🥰", centerX, cardY + 210);

        // Garis hati pemisah
        ctx.font = "40px serif";
        ctx.fillText("❤️ ❤️ ❤️", centerX, cardY + 280);

        // Isi surat (rata kiri di dalam kartu)
        const textX = cardX + 90;
        let y = cardY + 340;
        const lineH = 42;
        ctx.textAlign = "left";
        ctx.fillStyle = "#5a3a3a";
        ctx.font = "30px 'Times New Roman', serif";

        const lines = [
          "Hai sayang...,",
          "",
          "Hari ini menjadi salah satu hari paling",
          "bahagia dalam hidup aku. Kamu akhirnya",
          "mengatakan YES dan resmi menjadi",
          "pasangan aku. 🥰💍",
          "",
          "Terima kasih sudah memilih aku. Aku janji",
          "akan selalu menjaga hati aku buat kamu,",
          "memperhatikan, dan membuat kamu",
          "tersenyum setiap hari. 💕",
          "",
          "Kamu adalah orang yang aku tunggu",
          "selama ini. I love you, pookie! 🐻💗",
        ];
        lines.forEach((line) => {
          ctx.fillText(line, textX, y);
          y += lineH;
        });

        // Kotak tanggal jadian
        const boxY = y + 16;
        const boxW = cardW - 180;
        const boxH = 190;
        ctx.fillStyle = "#fff0f5";
        ctx.strokeStyle = "#ff8fab";
        ctx.lineWidth = 3;
        roundRect(ctx, textX, boxY, boxW, boxH, 24, true, true);

        ctx.textAlign = "center";
        const boxCx = textX + boxW / 2;
        ctx.fillStyle = "#bd3131";
        ctx.font = "26px 'Times New Roman', serif";
        ctx.fillText("📜 Tanggal Resmi Jadian Kita 📜", boxCx, boxY + 48);
        ctx.font = "bold 38px 'Times New Roman', serif";
        ctx.fillText(
          `${d.namaHari}, ${d.tanggal} ${d.namaBulan} ${d.tahun}`,
          boxCx,
          boxY + 105,
        );
        ctx.font = "30px 'Times New Roman', serif";
        ctx.fillText(
          `pukul ${d.jam}:${d.menit}:${d.detik} WIB ⏰💞`,
          boxCx,
          boxY + 155,
        );

        // Tanda tangan
        ctx.font = "italic 30px 'Times New Roman', serif";
        ctx.fillStyle = "#d6608a";
        ctx.fillText(
          "Dengan sepenuh hati, kekasihmu 💖",
          centerX,
          boxY + boxH + 65,
        );

        // Hati-hati kecil dekorasi
        ctx.font = "34px serif";
        ctx.fillText("🌸 💕 🌸 💕 🌸", centerX, boxY + boxH + 120);

        // Unduh
        const link = document.createElement("a");
        link.download = "Surat-Cinta-Kita.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      }

      // Helper menggambar kotak membulat
      function roundRect(ctx, x, y, w, h, r, fill, stroke) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
        if (fill) ctx.fill();
        if (stroke) ctx.stroke();
      }
